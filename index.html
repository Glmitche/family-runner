<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Family Dash!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;overflow:hidden;
  font-family:'Nunito',sans-serif;
  background:radial-gradient(ellipse at 50% 0%,#2d1060 0%,#1a0a2e 60%,#0a0015 100%);
}
body{display:flex;align-items:center;justify-content:center;touch-action:pan-y;}
#app{
  position:relative;
  user-select:none;
  flex-shrink:0;
  /* width/height set dynamically by resizeApp() */
}
canvas{
  display:block;width:100%;height:100%;
  border-radius:16px;
  box-shadow:0 8px 60px #7c3aed55,0 2px 20px #00000088;
}

/* SCREENS */
.screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  border-radius:16px;padding:20px;
  background:linear-gradient(160deg,#1e0a40 0%,#0f0525 100%);
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
/* center screens that don't need to scroll */
#titleScreen,#gameoverScreen,#lbScreen{justify-content:center;}
.screen.hidden{display:none !important;}

/* TITLE */
.title-logo{
  font-family:'Fredoka One',cursive;font-size:52px;letter-spacing:2px;
  background:linear-gradient(135deg,#ffd700,#ff6b6b,#a855f7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 20px #ffd70055);line-height:1;margin-bottom:4px;
}
.title-sub{font-size:13px;letter-spacing:4px;color:#a78bfa;text-transform:uppercase;margin-bottom:28px;}

/* BUTTONS */
.btn{
  font-family:'Fredoka One',cursive;font-size:20px;
  padding:14px 40px;border:none;border-radius:50px;
  cursor:pointer;transition:transform .12s,box-shadow .12s;letter-spacing:1px;
  -webkit-tap-highlight-color:transparent;
}
.btn:active{transform:scale(0.94);}
.btn-primary{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;box-shadow:0 4px 20px #7c3aed88;}
.btn-ghost{background:rgba(255,255,255,0.08);color:#c4b5fd;font-size:16px;padding:10px 26px;}

/* CHARACTER SELECT */
.select-title{font-family:'Fredoka One',cursive;font-size:26px;color:#fff;margin-bottom:2px;margin-top:10px;}
.select-sub{font-size:12px;color:#a78bfa;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;}
.char-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;flex-shrink:0;}
.char-card{
  background:rgba(255,255,255,0.05);
  border:2px solid rgba(255,255,255,0.08);
  border-radius:14px;padding:12px 8px;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;transition:all .18s;
  -webkit-tap-highlight-color:transparent;
  position:relative;
}
.char-card.selected{transform:translateY(-3px);}
.char-name{font-family:'Fredoka One',cursive;font-size:18px;color:#fff;}
.char-desc{font-size:10px;color:#c4b5fd;text-align:center;line-height:1.4;}
.char-tag{font-size:9px;font-weight:900;letter-spacing:2px;padding:2px 8px;border-radius:20px;text-transform:uppercase;}
.char-best{font-size:10px;color:#ffd700;font-weight:700;}

/* HUD */
#gameHUD{
  position:absolute;top:0;left:0;right:0;
  padding:12px 16px;display:flex;justify-content:space-between;align-items:flex-start;
  pointer-events:none;
}
.hud-label{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.45);text-transform:uppercase;}
.hud-val{font-family:'Fredoka One',cursive;font-size:26px;color:#fff;text-shadow:0 0 12px currentColor;line-height:1;}
.hud-right{text-align:right;}
.hud-charname{font-family:'Fredoka One',cursive;font-size:13px;color:rgba(255,255,255,0.6);}

/* GAME OVER */
.go-title{
  font-family:'Fredoka One',cursive;font-size:44px;
  background:linear-gradient(135deg,#ff6b6b,#ffd700);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 14px #ff6b6b77);letter-spacing:2px;
}
.go-stats{
  background:rgba(255,255,255,0.06);border-radius:14px;
  padding:14px 26px;display:flex;flex-direction:column;gap:8px;
  width:100%;max-width:260px;margin:6px 0;
}
.go-row{display:flex;justify-content:space-between;align-items:center;gap:20px;}
.go-lbl{font-size:13px;color:#a78bfa;letter-spacing:1px;}
.go-num{font-family:'Fredoka One',cursive;font-size:20px;color:#fff;}
.new-best{font-family:'Fredoka One',cursive;font-size:18px;color:#ffd700;animation:shine 0.9s ease-in-out infinite alternate;}
@keyframes shine{from{opacity:.6}to{opacity:1;filter:drop-shadow(0 0 8px #ffd700);}}
.go-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:4px;}

/* LEADERBOARD */
.lb-title{font-family:'Fredoka One',cursive;font-size:28px;color:#ffd700;letter-spacing:2px;margin-bottom:10px;}
.lb-table{width:100%;max-width:310px;display:flex;flex-direction:column;gap:6px;}
.lb-row{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,0.05);border-radius:12px;padding:10px 14px;
  border:1px solid rgba(255,255,255,0.07);
}
.lb-medal{font-size:22px;width:28px;text-align:center;}
.lb-rname{font-family:'Fredoka One',cursive;font-size:17px;flex:1;}
.lb-rscore{font-family:'Fredoka One',cursive;font-size:18px;color:#ffd700;}
.lb-empty{color:#a78bfa;font-size:14px;margin-top:16px;}

/* JUMP hint */
#jumpHint{
  position:absolute;bottom:16px;left:0;right:0;
  text-align:center;pointer-events:none;
  font-family:'Fredoka One',cursive;font-size:14px;
  color:rgba(255,255,255,0.35);letter-spacing:1px;
}
</style>
</head>
<body>
<div id="app">
  <canvas id="gameCanvas"></canvas>

  <!-- TITLE SCREEN -->
  <div class="screen" id="titleScreen">
    <div class="title-logo">Family<br>Dash!</div>
    <div class="title-sub">The Mitchell Run</div>
    <button class="btn btn-primary" id="playBtn">▶ PLAY</button>
    <button class="btn btn-ghost" id="lbBtn" style="margin-top:10px;">🏆 Leaderboard</button>
  </div>

  <!-- CHARACTER SELECT -->
  <div class="screen hidden" id="selectScreen">
    <div class="select-title">Pick Your Runner</div>
    <div class="select-sub">Tap to select</div>
    <div class="char-grid" id="charGrid"></div>
    <button class="btn btn-primary" id="startBtn" style="margin-top:14px;opacity:0.35;pointer-events:none;">LET'S RUN! 🏃</button>
    <button class="btn btn-ghost" id="backBtn" style="margin-top:8px;">← Back</button>
  </div>

  <!-- HUD (shown during gameplay) -->
  <div id="gameHUD" style="display:none;">
    <div>
      <div class="hud-label">Score</div>
      <div class="hud-val" id="hudScore" style="color:#a855f7;">0</div>
    </div>
    <div class="hud-right">
      <div class="hud-label">Best</div>
      <div class="hud-val" id="hudBest" style="color:#ffd700;font-size:18px;">0</div>
      <div class="hud-charname" id="hudCharName"></div>
    </div>
  </div>
  <div id="jumpHint" style="display:none;">TAP TO JUMP • DOUBLE TAP = DOUBLE JUMP</div>

  <!-- GAME OVER -->
  <div class="screen hidden" id="gameoverScreen">
    <div class="go-title">GAME OVER</div>
    <canvas id="goCanvas" width="80" height="104" style="margin:4px 0;"></canvas>
    <div class="go-stats">
      <div class="go-row"><span class="go-lbl">Score</span><span class="go-num" id="goScore">0</span></div>
      <div class="go-row"><span class="go-lbl">Jumps</span><span class="go-num" id="goJumps">0</span></div>
      <div class="go-row"><span class="go-lbl">Cleared</span><span class="go-num" id="goCleared">0</span></div>
      <div class="go-row"><span class="go-lbl">Best Ever</span><span class="go-num" id="goBest">0</span></div>
    </div>
    <div id="newBestMsg" class="new-best hidden">🏆 NEW BEST!</div>
    <div class="go-btns">
      <button class="btn btn-primary" style="font-size:17px;padding:12px 28px;" id="replayBtn">▶ Play Again</button>
      <button class="btn btn-ghost" id="changeBtn">Change Runner</button>
    </div>
    <button class="btn btn-ghost" id="goLbBtn" style="margin-top:6px;">🏆 Leaderboard</button>
  </div>

  <!-- LEADERBOARD -->
  <div class="screen hidden" id="lbScreen">
    <div class="lb-title">🏆 Top Scores</div>
    <div class="lb-table" id="lbTable"></div>
    <button class="btn btn-ghost" id="lbBackBtn" style="margin-top:18px;">← Menu</button>
  </div>
</div>

<script>
// ─── FAMILY DATA ──────────────────────────────────────────
const FAMILY = [
  {
    id:'dad', name:'Dad', desc:'Tallest & Strongest',
    tag:'POWER', tagColor:'#7c3aed',
    colors:{skin:'#8B5E3C',hair:'#1a1008',shirt:'#7c3aed',pants:'#4c2d80',shoe:'#3b1f60',accent:'#9d7cd8'},
    height:1.22, speed:1.0, jumpPow:1.0
  },
  {
    id:'mom', name:'Mom', desc:'Fast & Graceful',
    tag:'GRACE', tagColor:'#e879a0',
    colors:{skin:'#8B5E3C',hair:'#1a1008',shirt:'#9b1b4b',pants:'#c2185b',shoe:'#880e4f',accent:'#ff80ab'},
    height:1.08, speed:1.1, jumpPow:1.05
  },
  {
    id:'sophia', name:'Sophia', desc:'Oldest Girl, Quick!',
    tag:'SWIFT', tagColor:'#e91e8c',
    colors:{skin:'#8B5E3C',hair:'#1a1008',shirt:'#e91e8c',pants:'#111111',shoe:'#333333',accent:'#ff69b4'},
    height:0.98, speed:1.15, jumpPow:1.1
  },
  {
    id:'tre', name:'Tre', desc:'Youngest, Bounciest!',
    tag:'BOUNCE', tagColor:'#f97316',
    colors:{skin:'#8B5E3C',hair:'#1a1008',shirt:'#f97316',pants:'#f59e0b',shoe:'#d97706',accent:'#fbbf24'},
    height:0.80, speed:1.2, jumpPow:1.2
  }
];

// ─── SCORES ───────────────────────────────────────────────
function getScores(){
  try{ return JSON.parse(localStorage.getItem('familyDash2')||'{}'); }catch(e){ return {}; }
}
function saveScore(id, s){
  const all = getScores();
  if(!all[id] || s > all[id]) all[id] = s;
  try{ localStorage.setItem('familyDash2', JSON.stringify(all)); }catch(e){}
}
function getBest(id){ return getScores()[id] || 0; }

// ─── DRAW CHARACTER ───────────────────────────────────────
function drawChar(ctx, char, cx, topY, baseH, frame, dead){
  const c = char.colors;
  const s = char.height;
  const u = baseH / 7;

  const legSwing = dead ? 0 : Math.sin(frame * 0.3) * 14 * s;
  const armSwing = dead ? 0 : Math.sin(frame * 0.3 + Math.PI) * 11 * s;
  const bob = dead ? 0 : Math.abs(Math.sin(frame * 0.3)) * 2.5;
  const by = topY + bob;

  ctx.save();

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(cx, topY + baseH * s * 0.93, u * 1.1 * s, u * 0.22 * s, 0, 0, Math.PI * 2);
  ctx.fill();

  // left leg
  ctx.save();
  ctx.translate(cx - u * 0.33 * s, by + baseH * s * 0.53);
  ctx.rotate(legSwing * Math.PI / 180);
  ctx.fillStyle = c.pants;
  ctx.beginPath(); ctx.roundRect(-u*0.26*s, 0, u*0.52*s, u*1.55*s, u*0.18*s); ctx.fill();
  ctx.fillStyle = c.shoe;
  ctx.beginPath(); ctx.roundRect(-u*0.26*s, u*1.45*s, u*0.68*s, u*0.38*s, u*0.12*s); ctx.fill();
  ctx.restore();

  // right leg
  ctx.save();
  ctx.translate(cx + u * 0.33 * s, by + baseH * s * 0.53);
  ctx.rotate(-legSwing * Math.PI / 180);
  ctx.fillStyle = c.pants;
  ctx.beginPath(); ctx.roundRect(-u*0.26*s, 0, u*0.52*s, u*1.55*s, u*0.18*s); ctx.fill();
  ctx.fillStyle = c.shoe;
  ctx.beginPath(); ctx.roundRect(-u*0.26*s, u*1.45*s, u*0.68*s, u*0.38*s, u*0.12*s); ctx.fill();
  ctx.restore();

  // body
  ctx.fillStyle = c.shirt;
  ctx.beginPath(); ctx.roundRect(cx - u*0.70*s, by + baseH*s*0.28, u*1.40*s, u*1.55*s*s, u*0.22*s); ctx.fill();
  ctx.fillStyle = c.accent + '88';
  ctx.fillRect(cx - u*0.70*s, by + baseH*s*0.37, u*1.40*s, u*0.13*s);

  // left arm
  ctx.save();
  ctx.translate(cx - u*0.78*s, by + baseH*s*0.33);
  ctx.rotate(armSwing * Math.PI / 180);
  ctx.fillStyle = c.shirt;
  ctx.beginPath(); ctx.roundRect(-u*0.20*s, 0, u*0.40*s, u*1.25*s, u*0.16*s); ctx.fill();
  ctx.fillStyle = c.skin;
  ctx.beginPath(); ctx.arc(0, u*1.35*s, u*0.26*s, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // right arm
  ctx.save();
  ctx.translate(cx + u*0.78*s, by + baseH*s*0.33);
  ctx.rotate(-armSwing * Math.PI / 180);
  ctx.fillStyle = c.shirt;
  ctx.beginPath(); ctx.roundRect(-u*0.20*s, 0, u*0.40*s, u*1.25*s, u*0.16*s); ctx.fill();
  ctx.fillStyle = c.skin;
  ctx.beginPath(); ctx.arc(0, u*1.35*s, u*0.26*s, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // neck
  ctx.fillStyle = c.skin;
  ctx.beginPath(); ctx.roundRect(cx - u*0.20*s, by + baseH*s*0.18, u*0.40*s, u*0.45*s, u*0.08*s); ctx.fill();

  // head
  ctx.fillStyle = c.skin;
  ctx.beginPath(); ctx.ellipse(cx, by + baseH*s*0.11, u*0.70*s, u*0.80*s, 0, 0, Math.PI*2); ctx.fill();

  // hair
  ctx.fillStyle = c.hair;
  ctx.beginPath(); ctx.ellipse(cx, by + baseH*s*0.05, u*0.72*s, u*0.44*s, 0, Math.PI, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx - u*0.62*s, by + baseH*s*0.09, u*0.18*s, u*0.42*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + u*0.62*s, by + baseH*s*0.09, u*0.18*s, u*0.42*s, 0, 0, Math.PI*2); ctx.fill();

  if (!dead) {
    // eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(cx-u*0.26*s, by+baseH*s*0.115, u*0.15*s, u*0.18*s, 0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+u*0.26*s, by+baseH*s*0.115, u*0.15*s, u*0.18*s, 0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1a1008';
    ctx.beginPath(); ctx.arc(cx-u*0.24*s, by+baseH*s*0.118, u*0.09*s, 0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+u*0.28*s, by+baseH*s*0.118, u*0.09*s, 0,Math.PI*2); ctx.fill();
    // smile
    ctx.strokeStyle = '#1a1008'; ctx.lineWidth = u*0.09*s;
    ctx.beginPath(); ctx.arc(cx, by+baseH*s*0.155, u*0.18*s, 0.2, Math.PI-0.2); ctx.stroke();
  } else {
    // X eyes dead
    ctx.strokeStyle = '#ff4444'; ctx.lineWidth = u*0.13*s;
    const ex1 = [cx-u*0.36*s, cx-u*0.16*s], ey = [by+baseH*s*0.08, by+baseH*s*0.15];
    ctx.beginPath(); ctx.moveTo(ex1[0],ey[0]); ctx.lineTo(ex1[1],ey[1]); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ex1[1],ey[0]); ctx.lineTo(ex1[0],ey[1]); ctx.stroke();
    const ex2 = [cx+u*0.16*s, cx+u*0.36*s];
    ctx.beginPath(); ctx.moveTo(ex2[0],ey[0]); ctx.lineTo(ex2[1],ey[1]); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ex2[1],ey[0]); ctx.lineTo(ex2[0],ey[1]); ctx.stroke();
  }

  ctx.restore();
}

// ─── CANVAS SETUP ─────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 430, H = 520;
canvas.width = W; canvas.height = H;
const GROUND = H - 80;
const CHAR_X = 90;

// ─── GAME STATE ───────────────────────────────────────────
let state = 'title';
let selectedChar = null;
let score = 0, jumpCount = 0, clearedCount = 0;
let frame = 0;
let speed = 0, baseSpeed = 0;
let player = { y: GROUND, vy: 0, onGround: true, dead: false };
let obstacles = [];
let particles = [];
let bgX = 0;
let animId = null;
let nextObsDist = 0;
let djAvail = false;

// stars
const stars = Array.from({length:55},()=>({
  x:Math.random()*W, y:Math.random()*(GROUND*0.6),
  r:Math.random()*1.4+0.3, b:Math.random()*Math.PI*2
}));
// clouds
const clouds = Array.from({length:5},(_,i)=>({
  x:Math.random()*W*1.8, y:35+Math.random()*70,
  w:55+Math.random()*75, h:22+Math.random()*18,
  spd:0.28+Math.random()*0.28
}));

// Draw a blank frame on load
(function initCanvas(){
  ctx.fillStyle='#0f0525';
  ctx.fillRect(0,0,W,H);
})();

// ─── SCREEN HELPERS ───────────────────────────────────────
function hideAllScreens(){
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById('gameHUD').style.display = 'none';
  document.getElementById('jumpHint').style.display = 'none';
}
function showScreen(id){
  hideAllScreens();
  const el = document.getElementById(id);
  if(el) el.classList.remove('hidden');
}

// ─── BUILD CHARACTER CARDS ────────────────────────────────
function buildCards(){
  const grid = document.getElementById('charGrid');
  grid.innerHTML = '';

  FAMILY.forEach(char => {
    const card = document.createElement('div');
    card.className = 'char-card';
    card.id = 'card_' + char.id;

    // preview canvas
    const cv = document.createElement('canvas');
    cv.width = 78; cv.height = 96;
    cv.style.cssText = 'border-radius:8px;';
    const cx2 = cv.getContext('2d');
    drawChar(cx2, char, 39, 4, 78, 8, false);

    const nm = document.createElement('div');
    nm.className = 'char-name'; nm.textContent = char.name;

    const desc = document.createElement('div');
    desc.className = 'char-desc'; desc.textContent = char.desc;

    const tag = document.createElement('div');
    tag.className = 'char-tag';
    tag.textContent = char.tag;
    tag.style.cssText = `background:${char.tagColor}33;color:${char.tagColor};`;

    card.appendChild(cv);
    card.appendChild(nm);
    card.appendChild(desc);
    card.appendChild(tag);

    const best = getBest(char.id);
    if(best > 0){
      const bDiv = document.createElement('div');
      bDiv.className = 'char-best';
      bDiv.textContent = '⭐ Best: ' + best;
      card.appendChild(bDiv);
    }

    // CLICK HANDLER — direct, no delegation
    card.addEventListener('click', function(e){
      e.stopPropagation();
      selectCharacter(char.id);
    });
    card.addEventListener('touchend', function(e){
      e.preventDefault();
      e.stopPropagation();
      selectCharacter(char.id);
    }, {passive: false});

    grid.appendChild(card);
  });
}

function selectCharacter(id){
  selectedChar = FAMILY.find(c => c.id === id);
  if(!selectedChar) return;

  // update card styles
  FAMILY.forEach(c => {
    const card = document.getElementById('card_' + c.id);
    if(!card) return;
    if(c.id === id){
      card.classList.add('selected');
      card.style.borderColor = selectedChar.colors.shirt;
      card.style.background = selectedChar.colors.shirt + '22';
      card.style.transform = 'translateY(-3px)';
    } else {
      card.classList.remove('selected');
      card.style.borderColor = 'rgba(255,255,255,0.08)';
      card.style.background = 'rgba(255,255,255,0.05)';
      card.style.transform = '';
    }
  });

  // unlock start button
  const startBtn = document.getElementById('startBtn');
  startBtn.style.opacity = '1';
  startBtn.style.pointerEvents = 'auto';
  startBtn.style.background = `linear-gradient(135deg,${selectedChar.colors.shirt},${selectedChar.colors.accent})`;
}

// ─── BUTTON WIRING (after DOM ready) ─────────────────────
document.getElementById('playBtn').addEventListener('click', () => { showScreen('selectScreen'); buildCards(); });
document.getElementById('lbBtn').addEventListener('click', () => { showScreen('lbScreen'); renderLB(); });
document.getElementById('backBtn').addEventListener('click', () => showScreen('titleScreen'));
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('replayBtn').addEventListener('click', startGame);
document.getElementById('changeBtn').addEventListener('click', () => { showScreen('selectScreen'); buildCards(); });
document.getElementById('goLbBtn').addEventListener('click', () => { showScreen('lbScreen'); renderLB(); });
document.getElementById('lbBackBtn').addEventListener('click', () => showScreen('titleScreen'));

// ─── LEADERBOARD ──────────────────────────────────────────
function renderLB(){
  const tbl = document.getElementById('lbTable');
  tbl.innerHTML = '';
  const sorted = FAMILY.map(c => ({...c, best: getBest(c.id)})).sort((a,b) => b.best - a.best);
  const medals = ['🥇','🥈','🥉','4️⃣'];
  const any = sorted.some(r => r.best > 0);
  if(!any){
    tbl.innerHTML = '<div class="lb-empty">No scores yet — play to set records!</div>';
    return;
  }
  sorted.forEach((r, i) => {
    if(r.best === 0) return;
    const row = document.createElement('div');
    row.className = 'lb-row';
    row.style.borderColor = r.colors.shirt + '55';
    row.innerHTML = `<span class="lb-medal">${medals[i]||''}</span>
      <span class="lb-rname" style="color:${r.colors.shirt}">${r.name}</span>
      <span class="lb-rscore">${r.best}</span>`;
    tbl.appendChild(row);
  });
}

// ─── GAME ─────────────────────────────────────────────────
function startGame(){
  if(!selectedChar) return;
  hideAllScreens();
  document.getElementById('gameHUD').style.display = 'flex';
  document.getElementById('jumpHint').style.display = 'block';
  document.getElementById('hudCharName').textContent = selectedChar.name;
  document.getElementById('hudCharName').style.color = selectedChar.colors.shirt;

  score = 0; jumpCount = 0; clearedCount = 0; frame = 0;
  baseSpeed = 4.6 * selectedChar.speed;
  speed = baseSpeed;
  obstacles = []; particles = [];
  nextObsDist = 280 + Math.random() * 220;
  player = { y: GROUND, vy: 0, onGround: true, dead: false };
  djAvail = false;
  state = 'playing';
  updateHUD();
  if(animId) cancelAnimationFrame(animId);
  gameLoop();
}

function updateHUD(){
  document.getElementById('hudScore').textContent = score;
  document.getElementById('hudBest').textContent = getBest(selectedChar.id);
}

function jump(){
  if(state !== 'playing') return;
  if(player.onGround){
    player.vy = -15.5 * selectedChar.jumpPow;
    player.onGround = false;
    djAvail = true;
    jumpCount++;
    spawnDust();
  } else if(djAvail){
    player.vy = -13.5 * selectedChar.jumpPow;
    djAvail = false;
    jumpCount++;
    spawnDust();
  }
}

function spawnDust(){
  for(let i=0;i<7;i++){
    particles.push({
      x:CHAR_X, y:player.y + 60*selectedChar.height,
      vx:(Math.random()-0.5)*3.5, vy:Math.random()*-2+0.5,
      life:1, r:2.5+Math.random()*2.5,
      color: selectedChar.colors.accent
    });
  }
}

function spawnObs(){
  const t = ['cactus','box','spikes','pole'][Math.floor(Math.random()*4)];
  const o = {type:t, x:W+30, passed:false};
  if(t==='cactus'){o.w=28;o.h=52+Math.random()*22;o.color='#22c55e';}
  else if(t==='box'){o.w=40;o.h=38+Math.random()*20;o.color='#f97316';}
  else if(t==='spikes'){o.w=64;o.h=22;o.color='#ef4444';}
  else{o.w=8;o.h=68+Math.random()*28;o.color='#818cf8';}
  obstacles.push(o);
}

function drawObs(o){
  const gY = GROUND;
  if(o.type==='cactus'){
    ctx.fillStyle = o.color;
    ctx.beginPath(); ctx.roundRect(o.x+6, gY-o.h, o.w-12, o.h, 4); ctx.fill();
    ctx.beginPath(); ctx.roundRect(o.x, gY-o.h*0.62, o.w, 9, 3); ctx.fill();
    ctx.beginPath(); ctx.roundRect(o.x, gY-o.h*0.62-15, 9, 18, 3); ctx.fill();
    ctx.beginPath(); ctx.roundRect(o.x+o.w-9, gY-o.h*0.62-10, 9, 14, 3); ctx.fill();
  } else if(o.type==='box'){
    ctx.fillStyle = o.color;
    ctx.beginPath(); ctx.roundRect(o.x, gY-o.h, o.w, o.h, 5); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillRect(o.x+4, gY-o.h+4, o.w-8, 4);
    ctx.fillRect(o.x+4, gY-o.h+4, 4, o.h-8);
  } else if(o.type==='spikes'){
    ctx.fillStyle = o.color;
    const n=4; const sw=o.w/n;
    for(let i=0;i<n;i++){
      ctx.beginPath();
      ctx.moveTo(o.x+i*sw, gY);
      ctx.lineTo(o.x+i*sw+sw/2, gY-o.h);
      ctx.lineTo(o.x+i*sw+sw, gY);
      ctx.closePath(); ctx.fill();
    }
  } else {
    const g2 = ctx.createLinearGradient(o.x, gY-o.h, o.x, gY);
    g2.addColorStop(0, o.color); g2.addColorStop(1, o.color+'44');
    ctx.fillStyle = g2;
    ctx.beginPath(); ctx.roundRect(o.x, gY-o.h, o.w, o.h, 4); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1;
    ctx.strokeRect(o.x, gY-o.h, o.w, o.h);
  }
}

function hitTest(){
  const pH = 80 * selectedChar.height;
  const px = CHAR_X - 14, py = player.y + 10, pw = 28, ph = pH - 16;
  for(const o of obstacles){
    const ox = o.x+4, oy = GROUND-o.h, ow = o.w-8, oh = o.h;
    if(px < ox+ow && px+pw > ox && py < oy+oh && py+ph > oy) return true;
  }
  return false;
}

function die(){
  state = 'dead';
  player.dead = true;
  const prev = getBest(selectedChar.id);
  const isNew = score > prev;
  saveScore(selectedChar.id, score);
  setTimeout(() => {
    document.getElementById('gameHUD').style.display = 'none';
    document.getElementById('jumpHint').style.display = 'none';
    showScreen('gameoverScreen');
    document.getElementById('goScore').textContent = score;
    document.getElementById('goJumps').textContent = jumpCount;
    document.getElementById('goCleared').textContent = clearedCount;
    document.getElementById('goBest').textContent = Math.max(score, prev);
    document.getElementById('newBestMsg').classList.toggle('hidden', !isNew);
    // draw dead char
    const gc = document.getElementById('goCanvas');
    const gctx = gc.getContext('2d');
    gctx.clearRect(0,0,80,104);
    drawChar(gctx, selectedChar, 40, 4, 80, 0, true);
  }, 650);
}

// ─── BACKGROUND ───────────────────────────────────────────
function drawBG(){
  const sky = ctx.createLinearGradient(0,0,0,GROUND);
  sky.addColorStop(0,'#0f0525'); sky.addColorStop(0.65,'#1e0a40'); sky.addColorStop(1,'#2d1060');
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,GROUND);

  stars.forEach(s => {
    s.b += 0.012;
    ctx.fillStyle = `rgba(255,255,255,${0.35+0.35*Math.abs(Math.sin(s.b))})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  });

  const spd = speed/baseSpeed;
  clouds.forEach(cl => {
    cl.x -= cl.spd * spd;
    if(cl.x + cl.w < -10) cl.x = W + 10;
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.beginPath(); ctx.ellipse(cl.x,cl.y,cl.w,cl.h,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cl.x-cl.w*0.35,cl.y+4,cl.w*0.55,cl.h*0.72,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cl.x+cl.w*0.35,cl.y+6,cl.w*0.5,cl.h*0.68,0,0,Math.PI*2); ctx.fill();
  });

  // ground fill
  const gGrad = ctx.createLinearGradient(0,GROUND,0,H);
  gGrad.addColorStop(0,'#3b1f6e'); gGrad.addColorStop(1,'#1e0a40');
  ctx.fillStyle = gGrad; ctx.fillRect(0,GROUND,W,H-GROUND);

  // ground glow line
  ctx.strokeStyle='rgba(168,85,247,0.55)'; ctx.lineWidth=2;
  ctx.shadowColor='#a855f7'; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.moveTo(0,GROUND); ctx.lineTo(W,GROUND); ctx.stroke();
  ctx.shadowBlur=0;

  // tile lanes
  bgX -= speed;
  if(bgX < -60) bgX += 60;
  ctx.fillStyle='rgba(255,255,255,0.03)';
  for(let i=0;i<9;i++) ctx.fillRect(bgX+i*60, GROUND+3, 56, H-GROUND-3);
  ctx.fillStyle='rgba(168,85,247,0.22)';
  for(let i=0;i<9;i++){
    const mx=((bgX+i*60+28)%W+W)%W;
    ctx.fillRect(mx, GROUND+10, 18, 3);
  }
}

// ─── MAIN LOOP ────────────────────────────────────────────
function gameLoop(){
  animId = requestAnimationFrame(gameLoop);
  ctx.clearRect(0,0,W,H);
  drawBG();

  if(state === 'playing'){
    frame++;
    speed = baseSpeed + score * 0.007;

    // physics
    player.vy += 0.68;
    player.y += player.vy;
    if(player.y >= GROUND){ player.y=GROUND; player.vy=0; player.onGround=true; djAvail=false; }

    // obstacles
    nextObsDist -= speed;
    if(nextObsDist <= 0){ spawnObs(); nextObsDist = 260 + Math.random()*300; }
    obstacles.forEach(o => o.x -= speed);
    obstacles = obstacles.filter(o => o.x > -120);

    // score
    obstacles.forEach(o => {
      if(!o.passed && o.x + o.w < CHAR_X - 18){
        o.passed = true;
        clearedCount++;
        score += 10;
        updateHUD();
        for(let i=0;i<5;i++) particles.push({x:CHAR_X+30,y:player.y+20,vx:1.2+Math.random()*2,vy:-1.5-Math.random()*2,life:1,r:2+Math.random()*2,color:'#ffd700'});
      }
    });
    if(frame % 6 === 0){ score++; updateHUD(); }

    if(hitTest()) die();

  } else if(state === 'dead'){
    player.vy += 0.5;
    player.y = Math.min(player.y + player.vy, GROUND);
  }

  obstacles.forEach(drawObs);

  // particles
  particles = particles.filter(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life-=0.045;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    return p.life > 0;
  });

  // player
  if(selectedChar){
    const charH = 88 * selectedChar.height;
    drawChar(ctx, selectedChar, CHAR_X, player.y, charH, state==='playing'?frame:0, player.dead);

    // double-jump dot indicator
    if(state==='playing' && !player.onGround){
      ctx.fillStyle = djAvail ? selectedChar.colors.accent : 'rgba(255,255,255,0.2)';
      ctx.beginPath(); ctx.arc(CHAR_X, player.y-10, 4, 0, Math.PI*2); ctx.fill();
    }
  }
}

// ─── INPUT ────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); jump(); }
});
canvas.addEventListener('touchstart', e => {
  if(state === 'playing'){ e.preventDefault(); jump(); }
}, {passive:false});
canvas.addEventListener('mousedown', e => { e.preventDefault(); jump(); });

// ─── RESPONSIVE SIZING ────────────────────────────────────
const ASPECT = W / H;

function resizeApp(){
  const app = document.getElementById('app');
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  let appW, appH;
  if(vw / vh < ASPECT){
    appW = vw;
    appH = Math.round(vw / ASPECT);
  } else {
    appH = vh;
    appW = Math.round(vh * ASPECT);
  }
  app.style.width  = appW + 'px';
  app.style.height = appH + 'px';
}

resizeApp();
window.addEventListener('resize', resizeApp);
window.addEventListener('orientationchange', () => setTimeout(resizeApp, 120));

// Start the idle render loop immediately
gameLoop();
</script>
